[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "asrkit"
version = "0.0.1"
description = "One interface to run and compare any speech-to-text model — local & cloud."
readme = "README.en.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "ASRKit" }]
keywords = ["asr", "speech-to-text", "stt", "speech-recognition", "whisper", "transcription"]
classifiers = [
    "Development Status :: 1 - Planning",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Homepage = "https://github.com/asrkit/asrkit"
Repository = "https://github.com/asrkit/asrkit"

[tool.hatch.build.targets.wheel]
packages = ["src/asrkit"]
