[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "asrkit"
version = "0.1.0"
description = "One interface to run and compare any speech-to-text model — local & cloud."
readme = "README.en.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "ASRKit" }]
keywords = ["asr", "speech-to-text", "stt", "speech-recognition", "whisper", "transcription"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Multimedia :: Sound/Audio :: Speech",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = []

[project.optional-dependencies]
# 端侧本地推理（sherpa-onnx 全家桶）+ 音频解码/重采样（opt-in convert 时用）
local = ["sherpa-onnx>=1.13.3", "numpy", "soundfile", "soxr"]
# 云端 API
cloud = ["requests", "numpy", "soundfile", "soxr"]
# 摊平为显式列表（避免自引用 asrkit[...] 在旧 pip 下解析不可靠）
all = ["sherpa-onnx>=1.13.3", "requests", "numpy", "soundfile", "soxr"]

[project.scripts]
asrkit = "asrkit.cli:main"

[project.urls]
Homepage = "https://github.com/asrkit/asrkit"
Repository = "https://github.com/asrkit/asrkit"

[tool.hatch.build.targets.wheel]
packages = ["src/asrkit"]
