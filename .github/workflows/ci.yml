name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - name: ruff (lint)
        run: python -m ruff check src tests e2e packaging
      - name: mypy (types)
        run: python -m mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      # 装 cloud + serve extras + dev（httpx/pytest-cov）：让 serve 测试不再 skip、并出覆盖率。
      # 不装 sherpa-onnx（端侧真机推理放 e2e.yml nightly / 手动）。
      - run: pip install ".[cloud,serve,dev]" build hatchling
      - run: python -m pytest --cov=asrkit --cov-report=term-missing
      - name: build, audit, rebuild, and smoke release artifacts
        if: matrix.python-version == '3.13'
        shell: bash
        run: |
          set -euo pipefail
          source_dir="$RUNNER_TEMP/asrkit-artifacts-source"
          rebuilt_dir="$RUNNER_TEMP/asrkit-artifacts-rebuilt"
          mkdir -p "$source_dir" "$rebuilt_dir"
          shopt -s nullglob

          python -m build --sdist --no-isolation --outdir "$source_dir" .
          python -m build --wheel --no-isolation --outdir "$source_dir" .
          source_wheels=("$source_dir"/asrkit-*.whl)
          sdists=("$source_dir"/asrkit-*.tar.gz)
          test "${#source_wheels[@]}" -eq 1
          test "${#sdists[@]}" -eq 1
          python packaging/audit_artifacts.py "${source_wheels[0]}" "${sdists[0]}"

          python -m pip wheel "${sdists[0]}" \
            --no-deps \
            --no-build-isolation \
            --wheel-dir "$rebuilt_dir"
          rebuilt_wheels=("$rebuilt_dir"/asrkit-*.whl)
          test "${#rebuilt_wheels[@]}" -eq 1
          python packaging/audit_artifacts.py \
            "${rebuilt_wheels[0]}" \
            --compare-wheels "${source_wheels[0]}" "${rebuilt_wheels[0]}"

          index=0
          for wheel in "${source_wheels[0]}" "${rebuilt_wheels[0]}"; do
            install_dir="$RUNNER_TEMP/asrkit-wheel-venv-$index"
            python -m venv "$install_dir"
            venv_python="$install_dir/bin/python"
            "$venv_python" -m pip install --disable-pip-version-check "$wheel"
            (
              cd "$RUNNER_TEMP"
              ASRKIT_WHEEL_INSTALL="$install_dir" "$venv_python" -c 'import os; from pathlib import Path; import asrkit; p = Path(asrkit.__file__).resolve(); root = Path(os.environ["ASRKIT_WHEEL_INSTALL"]).resolve(); assert p.is_relative_to(root), p'
              "$venv_python" -m asrkit.cli --version
              "$venv_python" -m asrkit.daemon --version
              "$venv_python" -m asrkit.cli list --ids | grep -Fx "sherpa/whisper-tiny"
              ASRKIT_WHEEL_INSTALL="$install_dir" "$venv_python" -c 'import os; from importlib.metadata import distribution; from pathlib import Path; d = distribution("asrkit"); root = Path(os.environ["ASRKIT_WHEEL_INSTALL"]).resolve(); assert Path(d.locate_file("")).resolve().is_relative_to(root); scripts = {e.name: e.value for e in d.entry_points if e.group == "console_scripts"}; assert scripts == {"asrkit": "asrkit.cli:main"}'
            )
            index=$((index + 1))
          done

  openai-sdk-contract:
    name: Official OpenAI SDK contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: e2e/openai-node/package-lock.json
      - name: Install contract dependencies
        run: |
          python -m pip install ".[serve]" "openai==2.47.0"
          npm ci --prefix e2e/openai-node --ignore-scripts
      - name: Exercise Python and Node SDKs
        shell: bash
        env:
          ASRKIT_BASE_URL: http://127.0.0.1:11436
          ASRKIT_SDK_TOKEN: asrkit-sdk-contract-token-00000001
          ASRKIT_AUDIO_FIXTURE: ${{ github.workspace }}/e2e/fixtures/1089-134686-0001.wav
        run: |
          set -euo pipefail
          python e2e/sdk_stub_server.py --port 11436 >"$RUNNER_TEMP/sdk-server.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true; wait "$server_pid" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:11436/health >/dev/null; then
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              sed 's/asrkit-sdk-contract-token-[0-9]*/[REDACTED]/g' "$RUNNER_TEMP/sdk-server.log" >&2
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:11436/health >/dev/null
          python e2e/test_openai_python_sdk.py
          node e2e/openai-node/contract.mjs
