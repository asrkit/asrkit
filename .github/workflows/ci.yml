name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - name: ruff (lint)
        run: python -m ruff check src tests e2e
      - name: mypy (types)
        run: python -m mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # 装 cloud + serve extras + dev（httpx/pytest-cov）：让 serve 测试不再 skip、并出覆盖率。
      # 不装 sherpa-onnx（端侧真机推理放 e2e.yml nightly / 手动）。
      - run: pip install ".[cloud,serve,dev]"
      - run: python -m pytest --cov=asrkit --cov-report=term-missing
      - name: wheel install smoke
        if: matrix.python-version == '3.13'
        shell: bash
        run: |
          wheel_dir="$RUNNER_TEMP/asrkit-wheel"
          install_dir="$RUNNER_TEMP/asrkit-wheel-install"
          python -m pip wheel . --no-deps --wheel-dir "$wheel_dir"
          python -m pip install --no-deps --target "$install_dir" "$wheel_dir"/asrkit-*.whl
          cd "$RUNNER_TEMP"
          ASRKIT_WHEEL_INSTALL="$install_dir" PYTHONPATH="$install_dir" python -c 'import os; from pathlib import Path; import asrkit; p = Path(asrkit.__file__).resolve(); root = Path(os.environ["ASRKIT_WHEEL_INSTALL"]).resolve(); assert p.is_relative_to(root), p'
          PYTHONPATH="$install_dir" python -m asrkit.cli --version
          PYTHONPATH="$install_dir" python -m asrkit.cloud_cli --version
          PYTHONPATH="$install_dir" python -m asrkit.cli list --ids | grep -Fx "sherpa/whisper-tiny"
          ASRKIT_WHEEL_INSTALL="$install_dir" PYTHONPATH="$install_dir" python -c 'import os; from importlib.metadata import distribution; from pathlib import Path; d = distribution("asrkit"); root = Path(os.environ["ASRKIT_WHEEL_INSTALL"]).resolve(); assert Path(d.locate_file("")).resolve().is_relative_to(root); scripts = {e.name: e.value for e in d.entry_points if e.group == "console_scripts"}; assert scripts["asrkit-cloud"] == "asrkit.cloud_cli:main"'
