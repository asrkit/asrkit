name: Cloud provider E2E

# 真实厂商调用会产生外部副作用和可能的费用，先只允许受控手动运行。
on:
  workflow_dispatch:
    inputs:
      second_provider:
        description: Second provider paired with DashScope
        required: true
        default: siliconflow
        type: choice
        options:
          - siliconflow
          - doubao

permissions:
  contents: read

concurrency:
  group: cloud-e2e-${{ inputs.second_provider }}
  cancel-in-progress: false

jobs:
  transcribe:
    name: DashScope + ${{ inputs.second_provider }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: cloud-e2e
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Install ASRKit and the official OpenAI SDK
        run: python -m pip install ".[serve]" "openai==2.47.0"
      - name: Transcribe with two real providers
        shell: bash
        env:
          ASRKIT_BASE_URL: http://127.0.0.1:11437
          ASRKIT_AUDIO_FIXTURE: ${{ github.workspace }}/e2e/fixtures/1089-134686-0001.wav
          ASRKIT_SECOND_PROVIDER: ${{ inputs.second_provider }}
          ASRKIT_CONFIG: ${{ runner.temp }}/asrkit-cloud-e2e-config.json
          ASRKIT_HTTP_RETRIES: "0"
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          DOUBAO_APP_KEY: ${{ secrets.DOUBAO_APP_KEY }}
          DOUBAO_ACCESS_KEY: ${{ secrets.DOUBAO_ACCESS_KEY }}
        run: |
          set -euo pipefail
          ASRKIT_GATEWAY_TOKEN="$(python -c 'import secrets; print(secrets.token_urlsafe(32))')"
          export ASRKIT_GATEWAY_TOKEN
          python -m asrkit.daemon --port 11437 >"$RUNNER_TEMP/cloud-daemon.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true; wait "$server_pid" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:11437/health >/dev/null; then
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              echo "ASRKit cloud daemon exited before becoming ready" >&2
              exit 1
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:11437/health >/dev/null
          python e2e/test_cloud_providers.py
