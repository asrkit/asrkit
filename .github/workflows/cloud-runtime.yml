name: Cloud runtime

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - ".github/workflows/cloud-runtime.yml"
      - "packaging/cloud/**"
      - "pyproject.toml"
      - "src/asrkit/**"
      - "tests/test_cloud_packaging.py"
      - "tests/test_cloud_runtime.py"
      - "tests/test_daemon.py"
  pull_request:
    paths:
      - ".github/workflows/cloud-runtime.yml"
      - "packaging/cloud/**"
      - "pyproject.toml"
      - "src/asrkit/**"
      - "tests/test_cloud_packaging.py"
      - "tests/test_cloud_runtime.py"
      - "tests/test_daemon.py"

permissions:
  contents: read

jobs:
  linux-x64:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install cloud build dependencies
        run: python -m pip install ".[cloud-build]"
      - name: Build and smoke frozen runtime
        run: python packaging/cloud/build.py
      - name: Verify in Debian without Python
        run: bash packaging/cloud/smoke-linux-container.sh dist/asrkit-cloud
      - name: Package reproducible archive
        id: artifact
        shell: bash
        run: |
          version="$(PYTHONPATH=src python -c 'import asrkit; print(asrkit.__version__)')"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" == "v${version}" ]]; then
            artifact_name="asrkit-cloud-v${version}-linux-x64-gnu"
          else
            short_sha="${GITHUB_SHA:0:7}"
            artifact_name="asrkit-cloud-v${version}-${short_sha}-linux-x64-gnu"
          fi
          archive="${artifact_name}.tar.gz"
          mkdir -p artifacts
          tar \
            --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -C dist \
            -czf "artifacts/$archive" \
            asrkit-cloud
          (cd artifacts && sha256sum "$archive" >"$archive.sha256")
          echo "name=$artifact_name" >>"$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
