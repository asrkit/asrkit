name: Publish Python package

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Verify release identity
        shell: bash
        run: |
          set -euo pipefail
          python -c 'import re, sys; raise SystemExit(0 if re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", sys.argv[1]) else "release tag must be vX.Y.Z")' "$RELEASE_TAG"
          test "$(git describe --tags --exact-match HEAD)" = "$RELEASE_TAG"
          git fetch --no-tags origin main
          git merge-base --is-ancestor HEAD origin/main
          package_version="$(python -c 'import ast; tree = ast.parse(open("src/asrkit/__init__.py", encoding="utf-8").read()); print(next(node.value.value for node in tree.body if isinstance(node, ast.Assign) and any(isinstance(target, ast.Name) and target.id == "__version__" for target in node.targets)))')"
          test "$RELEASE_TAG" = "v$package_version"
      - name: Build distributions
        run: |
          python -m pip install --disable-pip-version-check build
          python -m build
      - name: Audit distributions
        run: python packaging/audit_artifacts.py dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-distributions-${{ github.event.release.tag_name }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish distributions to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/asrkit
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-distributions-${{ github.event.release.tag_name }}
          path: dist/
      - name: Publish distributions with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
