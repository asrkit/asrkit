name: Publish Python package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z release tag to publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pypi-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - name: Verify release identity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python -c 'import re, sys; raise SystemExit(0 if re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", sys.argv[1]) else "release tag must be vX.Y.Z")' "$RELEASE_TAG"
          test "$(git describe --tags --exact-match HEAD)" = "$RELEASE_TAG"
          git fetch --no-tags origin main
          git merge-base --is-ancestor HEAD origin/main
          package_version="$(python -c 'import ast; tree = ast.parse(open("src/asrkit/__init__.py", encoding="utf-8").read()); print(next(node.value.value for node in tree.body if isinstance(node, ast.Assign) and any(isinstance(target, ast.Name) and target.id == "__version__" for target in node.targets)))')"
          test "$RELEASE_TAG" = "v$package_version"
          # GitHub Release 可见只证明发布事件存在；PyPI 可用性由发布后的独立 job 验证。
          test "$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)" = "$RELEASE_TAG"
      - name: Build distributions
        run: |
          python -m pip install --disable-pip-version-check build
          python -m build
      - name: Audit distributions
        run: python packaging/audit_artifacts.py dist/*
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: python-distributions-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish distributions to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/asrkit
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: python-distributions-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
          path: dist/
      - name: Publish distributions with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1

  verify-pypi:
    name: Verify version is available on PyPI
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
    steps:
      - name: Wait for the exact PyPI version
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          for attempt in {1..18}; do
            if curl --fail --silent --show-error "https://pypi.org/pypi/asrkit/$version/json" >/dev/null; then
              echo "PyPI version asrkit==$version is available"
              exit 0
            fi
            sleep 10
          done
          echo "GitHub Release $RELEASE_TAG exists, but PyPI version asrkit==$version is unavailable" >&2
          exit 1
