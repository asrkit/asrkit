name: E2E (nightly)

# 真实端到端：装 sherpa-onnx、pull 一个小端侧模型、用仓库固定样本做一次真实推理。
# 慢且要下载权重，故不进每次 push 的 CI，只每天跑一次 + 可手动触发。
on:
  schedule:
    - cron: "0 18 * * *"   # 每日 UTC 18:00（≈ 北京 02:00）
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - run: pip install ".[sherpa,dev]"
      - name: real pull + transcribe
        run: pytest e2e/test_real.py -v
